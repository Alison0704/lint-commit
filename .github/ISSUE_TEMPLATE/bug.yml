name: Bug
description: Report something broken.
title: "[Bug]: "
labels: ["type:bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken?
      placeholder: "Example: GitHub Pages deployment fails."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - System Design
        - Game Development
        - Layout Design
        - RTL and Verification
        - AI and ML
        - Web Development
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Open ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
      placeholder: "Example: Documentation should deploy successfully."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result / error log
      placeholder: "Paste terminal error here."
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - blocks everything
        - P1 - important
        - P2 - minor
        - P3 - cleanup later
    validations:
      required: true
